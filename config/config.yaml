# 美股量化交易系统配置 — V3 核心策略

# === 自选股（日报用） ===
watchlist:
  - AAPL    # Apple
  - MSFT    # Microsoft
  - GOOGL   # Google
  - AMZN    # Amazon
  - NVDA    # NVIDIA
  - META    # Meta
  - JPM     # JPMorgan

# === 基准 ===
benchmarks:
  - SPY     # S&P 500 ETF
  - QQQ     # Nasdaq 100 ETF

# === V3 组合策略参数 ===
portfolio:
  top_n: 8                        # 最多持有几只
  min_combined_score: 55          # 综合评分最低门槛
  min_momentum_score: 40          # 动量评分最低
  weight_fundamental: 0.5         # 基本面权重
  weight_momentum: 0.3            # 动量权重
  weight_analyst: 0.2             # 分析师权重
  max_single_weight: 0.15         # 单只最大仓位
  spy_base_weight: 0.20           # SPY 底仓
  trailing_stop_pct: 0.25         # trailing stop 回撤阈值
  rebalance_freq: monthly         # 再平衡频率
  initial_cash: 100000            # 回测初始资金
  commission: 5                   # 每笔佣金

# === Regime Filter ===
regime:
  use_regime_filter: true
  asymmetric: true                # 不对称 Regime（进 BEAR 严格，恢复宽松）
  bear_threshold: 3               # 4 个子信号中 >= 3 个看空才进 BEAR
  recovery_confirm_days: 14       # RECOVERY 阶段持续天数

# === 基本面评分维度 ===
value_screener:
  valuation_weight: 0.30          # 估值（PE/PB vs 行业）
  quality_weight: 0.25            # 质量（ROE/利润率）
  growth_weight: 0.20             # 成长（营收/EPS 增速）
  analyst_weight: 0.15            # 分析师（评级/目标价）
  health_weight: 0.10             # 财务健康（负债率/流动比）

# === 数据和缓存 ===
data:
  cache_dir: ./data/cache
  use_cache: true
  auto_update: true

# === 日报设置 ===
daily_report:
  enabled: true
  output_dir: ./reports
  anomaly_threshold_pct: 3.0      # 单日涨跌超此值触发异动提醒
  rsi_overbought: 80
  rsi_oversold: 20

# === Paper Trading ===
paper_trading:
  signals_dir: ./paper_trading/signals
  reviews_dir: ./paper_trading/reviews
  stock_pool: sp100               # sp100 or custom
  strategy_version: v3_core       # 锁定版本，不改

# === 其他 ===
risk_free_rate: 0.045             # 2026 无风险利率（美国国债）
